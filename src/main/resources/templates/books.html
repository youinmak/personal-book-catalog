<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Book Catalog</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #1c2431;
            --accent: #0f6b42;
            --danger: #b42318;
            --line: #d6dce6;
        }

        * {
            box-sizing: border-box;
            font-family: "Noto Sans", "Noto Sans Devanagari", "Segoe UI", sans-serif;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #e9f3ef 0%, #f4f6fb 60%, #ecf2ff 100%);
            color: var(--text);
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 24px;
        }

        .top-layout {
            display: grid;
            grid-template-columns: 2.1fr 1fr;
            gap: 16px;
            align-items: start;
        }

        h1, h2, h3 {
            margin-top: 0;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 20px;
            box-shadow: 0 8px 18px rgba(18, 31, 53, 0.05);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(220px, 1fr));
            gap: 12px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, minmax(200px, 1fr));
            gap: 12px;
        }

        .wishlist-block {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            background: #fbfcff;
        }

        .wishlist-action-panel {
            display: none;
            margin-top: 10px;
        }

        .wishlist-action-panel.active {
            display: block;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 6px;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 10px;
        }

        .actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 9px 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-link {
            text-decoration: none;
            display: inline-block;
            border-radius: 8px;
            padding: 9px 12px;
            font-weight: 600;
        }

        .btn-primary {
            background: var(--accent);
            color: #ffffff;
        }

        .btn-danger {
            background: var(--danger);
            color: #ffffff;
        }

        .btn-muted {
            background: #e7ebf3;
            color: #293142;
        }

        .alert {
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .alert-success {
            background: #def7e9;
            color: #0f5132;
            border: 1px solid #9eddb9;
        }

        .alert-error {
            background: #fde4e2;
            color: #7a271a;
            border: 1px solid #f7b4b0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border-top: 1px solid var(--line);
            vertical-align: top;
            padding: 10px 8px;
            text-align: left;
        }

        tr:first-child th {
            border-top: none;
        }

        .row-form {
            display: grid;
            grid-template-columns: repeat(3, minmax(180px, 1fr));
            gap: 8px;
        }

        .empty {
            color: #5c6677;
            padding: 8px 0;
        }

        .wishlist-item {
            border-top: 1px solid var(--line);
            padding: 8px 0;
        }

        .wishlist-item:first-child {
            border-top: none;
        }

        .pagination {
            margin-top: 14px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .page-link {
            display: inline-block;
            padding: 7px 10px;
            border-radius: 8px;
            background: #eef2f8;
            color: #2b3550;
            text-decoration: none;
            font-weight: 600;
        }

        .page-link.active {
            background: var(--accent);
            color: #ffffff;
        }

        @media (max-width: 1000px) {
            .top-layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 900px) {
            .grid, .grid-3, .row-form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Personal Book Catalog</h1>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <div class="top-layout">
        <section class="card">
            <h2>Add New Book</h2>
            <form th:action="@{/books}" th:object="${newBookForm}" method="post">
                <div class="grid">
                    <div>
                        <label for="bookNameEn">Book Name (English) *</label>
                        <input id="bookNameEn" type="text" th:field="*{bookNameEn}" required>
                    </div>
                    <div>
                        <label for="bookNameMr">Book Name (Marathi)</label>
                        <input id="bookNameMr" type="text" th:field="*{bookNameMr}">
                    </div>
                    <div>
                        <label for="authorNameEn">Author Name (English) *</label>
                        <input id="authorNameEn" type="text" th:field="*{authorNameEn}" required>
                    </div>
                    <div>
                        <label for="authorNameMr">Author Name (Marathi)</label>
                        <input id="authorNameMr" type="text" th:field="*{authorNameMr}">
                    </div>
                    <div>
                        <label for="readingStatus">Reading Status</label>
                        <select id="readingStatus" th:field="*{readingStatus}">
                            <option th:each="status : ${readingStatuses}" th:value="${status}" th:text="${status}"></option>
                        </select>
                    </div>
                    <div>
                        <label for="rating">Rating (1-5)</label>
                        <select id="rating" th:field="*{rating}">
                            <option value="">Not rated</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                        </select>
                    </div>
                    <div>
                        <label for="genre">Genre</label>
                        <input id="genre" type="text" list="genre-options" th:field="*{genre}" placeholder="Fiction">
                    </div>
                    <div>
                        <label for="bookLanguage">Book Language</label>
                        <input id="bookLanguage" type="text" list="language-options" th:field="*{bookLanguage}" placeholder="English">
                    </div>
                    <div>
                        <label for="location">Location</label>
                        <input id="location" type="text" th:field="*{location}" placeholder="Asad">
                    </div>
                    <div>
                        <label for="customTags">Custom Tags (comma-separated)</label>
                        <input id="customTags" type="text" th:field="*{customTags}" placeholder="dalit literature, memoir">
                    </div>
                    <div>
                        <label for="customCategories">Custom Categories (comma-separated)</label>
                        <input id="customCategories" type="text" th:field="*{customCategories}" placeholder="classics, must-read">
                    </div>
                </div>
                <div class="actions">
                    <button type="submit" class="btn-primary">Add Book</button>
                    <button type="reset" class="btn-muted">Clear</button>
                </div>
            </form>
            <datalist id="genre-options">
                <option th:each="item : ${genreSuggestions}" th:value="${item}"></option>
            </datalist>
            <datalist id="language-options">
                <option th:each="item : ${languageSuggestions}" th:value="${item}"></option>
            </datalist>
        </section>

        <section class="card">
            <h2>Wishlists</h2>

            <div class="wishlist-block">
                <label for="wishlistAction">Wishlist Action</label>
                <select id="wishlistAction">
                    <option value="create">Create Wishlist</option>
                    <option value="active" th:disabled="${#lists.isEmpty(wishlists)}">Active Wishlist</option>
                    <option value="rename" th:disabled="${activeWishlist == null}">Rename Active Wishlist</option>
                </select>

                <div id="wishlist-panel-create" class="wishlist-action-panel active">
                    <form th:action="@{/wishlists}" th:object="${newWishlistForm}" method="post">
                        <label for="newWishlistName">Create Wishlist</label>
                        <input id="newWishlistName" type="text" th:field="*{name}" placeholder="Wishlist name" required>
                        <div class="actions">
                            <button type="submit" class="btn-primary">Create</button>
                        </div>
                    </form>
                </div>

                <div id="wishlist-panel-active" class="wishlist-action-panel">
                    <form th:action="@{/books}" method="get">
                        <label for="activeWishlistSelect">Active Wishlist</label>
                        <select id="activeWishlistSelect" name="wishlistId" onchange="this.form.submit()" th:disabled="${#lists.isEmpty(wishlists)}">
                            <option th:if="${#lists.isEmpty(wishlists)}" value="">No wishlists available</option>
                            <option th:each="wishlist : ${wishlists}"
                                    th:value="${wishlist.id}"
                                    th:text="${wishlist.name}"
                                    th:selected="${wishlist.id == activeWishlistId}">
                            </option>
                        </select>
                    </form>
                </div>

                <div id="wishlist-panel-rename" class="wishlist-action-panel">
                    <div th:if="${activeWishlist != null}">
                        <form th:action="@{|/wishlists/${activeWishlist.id}/rename|}" th:object="${renameWishlistForm}" method="post">
                            <label for="renameWishlistName">Rename Active Wishlist</label>
                            <input id="renameWishlistName" type="text" th:field="*{name}" required>
                            <div class="actions">
                                <button type="submit" class="btn-primary">Rename</button>
                            </div>
                        </form>
                        <form th:action="@{|/wishlists/${activeWishlist.id}/delete|}" method="post" class="actions">
                            <button type="submit" class="btn-danger">Delete Wishlist</button>
                        </form>
                    </div>
                    <div th:if="${activeWishlist == null}" class="empty">
                        No active wishlist available.
                    </div>
                </div>
            </div>

            <div th:if="${activeWishlist != null}" class="wishlist-block">
                <h3 th:text="${activeWishlist.name}"></h3>
                <form th:action="@{|/wishlists/${activeWishlist.id}/items|}" th:object="${newWishlistItemForm}" method="post">
                    <label for="wishlistBookName">Book Name (English)</label>
                    <input id="wishlistBookName" type="text" th:field="*{bookNameEn}" required>
                    <label for="wishlistAuthorName">Author Name (English)</label>
                    <input id="wishlistAuthorName" type="text" th:field="*{authorNameEn}" required>
                    <div class="actions">
                        <button type="submit" class="btn-primary">Add Item</button>
                    </div>
                </form>

                <div th:if="${#lists.isEmpty(activeWishlist.items)}" class="empty">
                    No items in this wishlist.
                </div>

                <div th:if="${!#lists.isEmpty(activeWishlist.items)}">
                    <div class="wishlist-item" th:each="item : ${activeWishlist.items}">
                        <div><strong th:text="${item.bookNameEn}"></strong></div>
                        <div th:text="${item.authorNameEn}"></div>
                        <form th:action="@{|/wishlists/${activeWishlist.id}/items/${item.id}/delete|}" method="post" class="actions">
                            <button type="submit" class="btn-danger">Delete Item</button>
                        </form>
                    </div>
                </div>
            </div>

            <div th:if="${activeWishlist == null}" class="empty">
                No wishlists available.
            </div>
        </section>
    </div>

    <section class="card">
        <h2>Catalog</h2>
        <form th:action="@{/books}" th:object="${criteria}" method="get">
            <input type="hidden" name="wishlistId" th:value="${activeWishlistId}">
            <div class="grid-3">
                <div>
                    <label for="query">Search (all fields)</label>
                    <input id="query" type="text" th:field="*{query}" placeholder="Book, author, genre, tags">
                </div>
                <div>
                    <label for="criteriaReadingStatus">Reading Status</label>
                    <select id="criteriaReadingStatus" th:field="*{readingStatus}">
                        <option value="">All</option>
                        <option th:each="status : ${readingStatuses}" th:value="${status}" th:text="${status}"></option>
                    </select>
                </div>
                <div>
                    <label for="minRating">Minimum Rating</label>
                    <select id="minRating" th:field="*{minRating}">
                        <option value="">Any</option>
                        <option value="1">1+</option>
                        <option value="2">2+</option>
                        <option value="3">3+</option>
                        <option value="4">4+</option>
                        <option value="5">5</option>
                    </select>
                </div>
                <div>
                    <label for="criteriaGenre">Genre</label>
                    <input id="criteriaGenre" type="text" list="genre-options" th:field="*{genre}" placeholder="Fiction">
                </div>
                <div>
                    <label for="criteriaLanguage">Book Language</label>
                    <input id="criteriaLanguage" type="text" list="language-options" th:field="*{bookLanguage}" placeholder="English">
                </div>
                <div>
                    <label for="criteriaTags">Tags (comma-separated)</label>
                    <input id="criteriaTags" type="text" th:field="*{tags}" placeholder="science fiction, memoir">
                </div>
                <div>
                    <label for="criteriaCategories">Categories (comma-separated)</label>
                    <input id="criteriaCategories" type="text" th:field="*{categories}" placeholder="favorites, classics">
                </div>
                <div>
                    <label for="sortBy">Sort By</label>
                    <select id="sortBy" th:field="*{sortBy}">
                        <option value="id">Recently Added</option>
                        <option value="authorName">Author Name</option>
                        <option value="bookName">Book Name</option>
                        <option value="readingStatus">Reading Status</option>
                        <option value="rating">Rating</option>
                        <option value="genre">Genre</option>
                    </select>
                </div>
                <div>
                    <label for="sortDir">Sort Direction</label>
                    <select id="sortDir" th:field="*{sortDir}">
                        <option value="desc">Descending</option>
                        <option value="asc">Ascending</option>
                    </select>
                </div>
            </div>
            <div class="actions">
                <button type="submit" class="btn-primary">Apply</button>
                <a th:href="@{/books}" class="btn-link btn-muted">Clear</a>
            </div>
        </form>
        <p class="empty">Showing <span th:text="${#lists.size(books)}"></span> of <span th:text="${totalResults}"></span> result(s)</p>
        <p class="empty" th:if="${#lists.isEmpty(books)}">No books found for current criteria.</p>

        <table th:if="${!#lists.isEmpty(books)}">
            <thead>
            <tr>
                <th>ID</th>
                <th>Details</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.id}"></td>
                <td>
                    <form class="row-form" th:action="@{|/books/${book.id}/update|}" method="post">
                        <div>
                            <label>Book Name (English) *</label>
                            <input name="bookNameEn" type="text" required th:value="${book.bookNameEn}">
                        </div>
                        <div>
                            <label>Book Name (Marathi)</label>
                            <input name="bookNameMr" type="text" th:value="${book.bookNameMr}">
                        </div>
                        <div>
                            <label>Author Name (English) *</label>
                            <input name="authorNameEn" type="text" required th:value="${book.authorNameEn}">
                        </div>
                        <div>
                            <label>Author Name (Marathi)</label>
                            <input name="authorNameMr" type="text" th:value="${book.authorNameMr}">
                        </div>
                        <div>
                            <label>Reading Status</label>
                            <select name="readingStatus">
                                <option th:each="status : ${readingStatuses}" th:value="${status}" th:text="${status}" th:selected="${book.readingStatus == status}"></option>
                            </select>
                        </div>
                        <div>
                            <label>Rating (1-5)</label>
                            <select name="rating">
                                <option value="" th:selected="${book.rating == null}">Not rated</option>
                                <option value="1" th:selected="${book.rating == 1}">1</option>
                                <option value="2" th:selected="${book.rating == 2}">2</option>
                                <option value="3" th:selected="${book.rating == 3}">3</option>
                                <option value="4" th:selected="${book.rating == 4}">4</option>
                                <option value="5" th:selected="${book.rating == 5}">5</option>
                            </select>
                        </div>
                        <div>
                            <label>Genre</label>
                            <input name="genre" type="text" list="genre-options" th:value="${book.genre}">
                        </div>
                        <div>
                            <label>Book Language</label>
                            <input name="bookLanguage" type="text" list="language-options" th:value="${book.bookLanguage}">
                        </div>
                        <div>
                            <label>Location</label>
                            <input name="location" type="text" th:value="${book.location}">
                        </div>
                        <div>
                            <label>Custom Tags</label>
                            <input name="customTags" type="text" th:value="${book.customTags}">
                        </div>
                        <div>
                            <label>Custom Categories</label>
                            <input name="customCategories" type="text" th:value="${book.customCategories}">
                        </div>
                        <div class="actions">
                            <button type="submit" class="btn-primary">Update</button>
                        </div>
                    </form>
                </td>
                <td>
                    <form th:action="@{|/books/${book.id}/delete|}" method="post">
                        <button type="submit" class="btn-danger">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="pagination" th:if="${totalPages > 1}">
            <a class="page-link"
               th:if="${currentPage > 1}"
               th:href="@{/books(
                    page=${currentPage - 1},
                    wishlistId=${activeWishlistId},
                    query=${criteria.query},
                    readingStatus=${criteria.readingStatus},
                    minRating=${criteria.minRating},
                    genre=${criteria.genre},
                    bookLanguage=${criteria.bookLanguage},
                    tags=${criteria.tags},
                    categories=${criteria.categories},
                    sortBy=${criteria.sortBy},
                    sortDir=${criteria.sortDir}
               )}">
                Previous
            </a>

            <a th:each="pageNumber : ${#numbers.sequence(1, totalPages)}"
               class="page-link"
               th:classappend="${pageNumber == currentPage} ? ' active' : ''"
               th:text="${pageNumber}"
               th:href="@{/books(
                    page=${pageNumber},
                    wishlistId=${activeWishlistId},
                    query=${criteria.query},
                    readingStatus=${criteria.readingStatus},
                    minRating=${criteria.minRating},
                    genre=${criteria.genre},
                    bookLanguage=${criteria.bookLanguage},
                    tags=${criteria.tags},
                    categories=${criteria.categories},
                    sortBy=${criteria.sortBy},
                    sortDir=${criteria.sortDir}
               )}">
            </a>

            <a class="page-link"
               th:if="${currentPage < totalPages}"
               th:href="@{/books(
                    page=${currentPage + 1},
                    wishlistId=${activeWishlistId},
                    query=${criteria.query},
                    readingStatus=${criteria.readingStatus},
                    minRating=${criteria.minRating},
                    genre=${criteria.genre},
                    bookLanguage=${criteria.bookLanguage},
                    tags=${criteria.tags},
                    categories=${criteria.categories},
                    sortBy=${criteria.sortBy},
                    sortDir=${criteria.sortDir}
               )}">
                Next
            </a>
        </div>
    </section>
</div>
<script>
    (function () {
        const actionSelect = document.getElementById("wishlistAction");
        const panels = {
            create: document.getElementById("wishlist-panel-create"),
            active: document.getElementById("wishlist-panel-active"),
            rename: document.getElementById("wishlist-panel-rename")
        };

        function updateWishlistActionPanel() {
            const selectedAction = actionSelect.value;
            Object.keys(panels).forEach(function (key) {
                panels[key].classList.toggle("active", key === selectedAction);
            });
        }

        actionSelect.addEventListener("change", updateWishlistActionPanel);
        updateWishlistActionPanel();
    })();
</script>
</body>
</html>
