spring.application.name=personal-book-catalog

# H2 file-based persistence inside the repository.
spring.datasource.url=jdbc:h2:file:./data/booksdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

app.bootstrap.book-csv-path=./data/BookList.csv
app.bootstrap.enabled=true
app.bootstrap.marker-path=./data/.book-bootstrap.done
